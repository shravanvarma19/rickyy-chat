<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Profile • RickyY Chat</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#071018">
<meta name="mobile-web-app-capable" content="yes">
<script src="/socket.io/socket.io.js"></script>

<style>
*{box-sizing:border-box}
:root{
  --bg:#071018;
  --card:#111a27;
  --card2:#0d1624;
  --line:rgba(255,255,255,.08);
  --text:#f8fafc;
  --muted:#9ca3af;
  --green:#10b981;
  --red:#ef4444;
}
html,body{
  margin:0;
  min-height:100vh;
  background:#071018;
  color:var(--text);
  font-family:Inter,Arial,sans-serif;
}
body{
  background:
    radial-gradient(circle at top, rgba(16,185,129,.10), transparent 26%),
    linear-gradient(180deg,#071018,#0b1220);
}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}
.hidden{display:none!important}

/* MAIN PROFILE */
.profile-page{
  min-height:100vh;
  padding:14px 14px 90px;
}
.back-btn{
  position:fixed;
  top:18px;
  left:16px;
  z-index:10;
  border:0;
  background:transparent;
  color:#fff;
  font-size:42px;
  line-height:1;
  width:54px;
  height:54px;
}
.profile-head{
  max-width:520px;
  margin:64px auto 0;
  text-align:center;
}
.dp-box{
  width:170px;
  height:170px;
  margin:0 auto;
  position:relative;
}
.dp-box img{
  width:170px;
  height:170px;
  border-radius:50%;
  object-fit:cover;
  background:#111827;
  border:3px solid rgba(255,255,255,.08);
}
.dp-edit{
  position:absolute;
  right:6px;
  bottom:8px;
  width:48px;
  height:48px;
  border-radius:50%;
  border:3px solid #071018;
  background:linear-gradient(135deg,#10b981,#06b6d4);
  color:#fff;
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.name{
  margin:28px 0 0;
  font-size:42px;
  font-weight:900;
  letter-spacing:-1px;
}
.about-big{
  margin:28px 0 0;
  font-size:28px;
  font-weight:700;
  line-height:1.35;
}

/* DETAILS */
.details{
  max-width:650px;
  margin:52px auto 0;
  display:grid;
  gap:14px;
}
.info-card{
  background:rgba(255,255,255,.045);
  border:1px solid var(--line);
  border-radius:22px;
  padding:16px;
}
.label{
  color:var(--muted);
  font-size:13px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.6px;
  margin-bottom:10px;
}
.value-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
.value{
  font-size:18px;
  line-height:1.45;
  word-break:break-word;
}
.edit-btn{
  border:0;
  border-radius:14px;
  padding:9px 12px;
  background:rgba(16,185,129,.18);
  color:#86efac;
  font-weight:900;
}
.input,textarea{
  width:100%;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.06);
  color:#fff;
  outline:none;
  border-radius:16px;
  padding:13px 14px;
  font-size:16px;
}
textarea{min-height:92px;resize:vertical}
.count{
  color:var(--muted);
  font-size:12px;
  text-align:right;
  margin-top:8px;
}
.suggestions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:12px;
}
.chip{
  border:0;
  border-radius:999px;
  padding:10px 13px;
  background:rgba(255,255,255,.08);
  color:#fff;
  font-weight:800;
}
.actions{
  display:grid;
  gap:12px;
  margin-top:6px;
}
.action-btn{
  border:0;
  border-radius:18px;
  min-height:52px;
  padding:13px 16px;
  background:rgba(255,255,255,.06);
  color:#fff;
  font-size:17px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:12px;
  border:1px solid var(--line);
}
.save{
  background:linear-gradient(135deg,#10b981,#059669);
  justify-content:center;
}
.logout{
  background:rgba(239,68,68,.15);
  color:#fecaca;
}
.viewer-only .owner-only{display:none!important}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  z-index:1000;
  display:none;
  align-items:flex-end;
  background:rgba(0,0,0,.45);
}
.modal.show{display:flex}
.sheet{
  width:100%;
  max-width:560px;
  margin:0 auto;
  background:#0f172a;
  border-radius:26px 26px 0 0;
  padding:18px;
  border:1px solid var(--line);
  box-shadow:0 -24px 60px rgba(0,0,0,.32);
}
.sheet h3{margin:0 0 14px;font-size:22px}
.sheet-actions{display:flex;gap:10px;margin-top:14px}
.btn{
  flex:1;
  border:0;
  border-radius:15px;
  padding:13px;
  font-weight:900;
  color:#fff;
}
.btn-primary{background:#10b981}
.btn-secondary{background:rgba(255,255,255,.08)}
.btn-danger{background:#ef4444}

/* Bottom nav */
.mobile-bottom-nav{
  position:fixed;
  left:10px;
  right:10px;
  bottom:calc(8px + env(safe-area-inset-bottom));
  z-index:50;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  padding:8px;
  border-radius:24px;
  background:rgba(8,15,26,.92);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 20px 46px rgba(0,0,0,.34);
  backdrop-filter:blur(20px);
}
.mobile-bottom-nav button{
  border:none;
  border-radius:17px;
  min-height:54px;
  background:transparent;
  color:#9fb0c0;
  font-size:11px;
  font-weight:900;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.mobile-bottom-nav button span{font-size:19px}
.mobile-bottom-nav button.active{
  color:#fff;
  background:linear-gradient(135deg, rgba(16,185,129,.30), rgba(6,182,212,.18));
}

.toast{
  position:fixed;
  left:50%;
  bottom:100px;
  transform:translateX(-50%) translateY(20px);
  background:#111827;
  color:#fff;
  border:1px solid var(--line);
  border-radius:999px;
  padding:11px 15px;
  opacity:0;
  pointer-events:none;
  transition:.2s;
  z-index:2000;
  box-shadow:0 15px 30px rgba(0,0,0,.3);
}
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
@media(max-width:640px){
  .profile-head{margin-top:74px}
  .dp-box,.dp-box img{width:150px;height:150px}
  .name{font-size:36px}
  .about-big{font-size:24px}
  .details{margin-top:44px}
}
</style>
</head>

<body>
<div class="profile-page" id="profilePage">
  <button class="back-btn" onclick="goBack()">←</button>

  <div class="profile-head">
    <div class="dp-box">
      <img id="myDp" src="/default.png" alt="DP" onerror="this.onerror=null;this.src='/default.png'">
      <button id="dpEditBtn" class="dp-edit owner-only" onclick="document.getElementById('dpInput').click()">📷</button>
    </div>

    <h1 id="usernameText" class="name">User</h1>
    <div id="aboutBig" class="about-big">Hey there! I am using RickyY Chat</div>
  </div>

  <div class="details">
    <div class="info-card">
      <div class="label">Phone</div>
      <div class="value" id="phoneValue">📱 Not Added</div>
    </div>

    <div class="info-card">
      <div class="label">About</div>
      <div class="value-row">
        <div class="value" id="aboutValue">Hey there! I am using RickyY Chat</div>
        <button class="edit-btn owner-only" onclick="openAboutEditor()">Edit</button>
      </div>

      <div class="suggestions owner-only">
        <button class="chip" onclick="quickAbout('Available')">Available</button>
        <button class="chip" onclick="quickAbout('Busy')">Busy</button>
        <button class="chip" onclick="quickAbout('At work')">At work</button>
        <button class="chip" onclick="quickAbout('Sleeping 😴')">Sleeping 😴</button>
        <button class="chip" onclick="quickAbout('I love rashu 🥺💘')">I love rashu 🥺💘</button>
        <button class="chip" onclick="quickAbout('Urgent calls only ☎️')">Urgent calls only ☎️</button>
      </div>
    </div>

    <div class="info-card owner-only">
      <div class="label">Bio</div>
      <input id="bioInput" class="input" maxlength="120" placeholder="Write your bio">
      <div class="count"><span id="bioCount">0</span>/120</div>
    </div>

    <div class="actions">
      <button class="action-btn owner-only" onclick="document.getElementById('dpInput').click()">📷 Change DP</button>
      <button class="action-btn owner-only save" onclick="saveProfile()">Save Profile</button>
      <button class="action-btn" onclick="openMedia()">📂 Media</button>
      <button class="action-btn owner-only" onclick="openSettings()">⚙️ Settings</button>
      <button class="action-btn logout owner-only" onclick="logout()">🚪 Logout</button>
    </div>
  </div>
</div>

<input type="file" id="dpInput" hidden accept="image/*">

<nav class="mobile-bottom-nav">
  <button type="button" onclick="goTab('chats')"><span>💬</span>Chats</button>
  <button type="button" onclick="goTab('groups')"><span>👥</span>Groups</button>
  <button type="button" onclick="goTab('status')"><span>◎</span>Status</button>
  <button type="button" onclick="goTab('calls')"><span>📞</span>Calls</button>
  <button type="button" class="active"><span>👤</span>Profile</button>
</nav>

<div id="aboutModal" class="modal">
  <div class="sheet">
    <h3>Edit About</h3>
    <textarea id="aboutInput" maxlength="250" placeholder="Write about..."></textarea>
    <div class="count"><span id="aboutCount">0</span>/250</div>
    <div class="suggestions">
      <button class="chip" onclick="setAboutInput('Available')">Available</button>
      <button class="chip" onclick="setAboutInput('Busy')">Busy</button>
      <button class="chip" onclick="setAboutInput('At work')">At work</button>
      <button class="chip" onclick="setAboutInput('Sleeping 😴')">Sleeping 😴</button>
      <button class="chip" onclick="setAboutInput('I love rashu 🥺💘')">I love rashu 🥺💘</button>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-secondary" onclick="closeAboutEditor()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAboutFromModal()">Save</button>
    </div>
  </div>
</div>

<div id="settingsModal" class="modal">
  <div class="sheet">
    <h3>Settings</h3>
    <button class="action-btn" onclick="alert('App lock settings already in chat.html/profile settings section')">🔒 App Lock</button>
    <button class="action-btn" onclick="alert('Notifications are controlled by browser/app permissions')">🔔 Notifications</button>
    <div class="sheet-actions">
      <button class="btn btn-secondary" onclick="closeSettings()">Close</button>
    </div>
  </div>
</div>

<div id="mediaModal" class="modal">
  <div class="sheet">
    <h3>Media</h3>
    <div style="color:#cbd5e1;padding:12px 0;">Media gallery coming soon.</div>
    <div class="sheet-actions">
      <button class="btn btn-secondary" onclick="closeMedia()">Close</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const SERVER_URL = location.protocol === "capacitor:" ? "https://rickyy-chat.onrender.com" : "";
const APP = document.getElementById("profilePage");
const params = new URLSearchParams(location.search);

let me = localStorage.getItem("user") || "";
let token = localStorage.getItem("authToken") || "";
let profileUser = params.get("user") || me;
let isOwnProfile = !profileUser || profileUser === me;
let currentUserData = null;

const socket = typeof io !== "undefined" ? io(SERVER_URL || undefined, {
  transports:["websocket","polling"],
  reconnection:true
}) : null;

function api(path){
  if(SERVER_URL && path.startsWith("/")) return SERVER_URL + path;
  return path;
}
function headersJson(){
  const h = {"Content-Type":"application/json"};
  if(token) h.Authorization = "Bearer " + token;
  return h;
}
function authHeaders(){
  const h = {};
  if(token) h.Authorization = "Bearer " + token;
  return h;
}
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove("show"),1700);
}
function safeUrl(v, fallback="/default.png"){
  v = String(v || "").trim();
  if(!v) return fallback;
  if(v.includes("1777102046491-2236d5249791.png")) return fallback;
  if(/^https?:\/\//i.test(v)) return v;
  if(v.startsWith("/")) return api(v);
  if(v.startsWith("uploads/")) return api("/" + v);
  return api("/uploads/" + v.replace(/^\/+/,""));
}
function goBack(){
  if(history.length > 1) history.back();
  else location.href = "/chat.html";
}
function goTab(tab){
  location.replace("/chat.html?tab=" + encodeURIComponent(tab));
}
async function verify(){
  if(!me || !token){
    location.href="/index.html";
    return false;
  }
  try{
    const r = await fetch(api("/api/me"), {headers:{Authorization:"Bearer " + token}});
    const d = await r.json().catch(()=>null);
    if(d && d.ok && d.user){
      me = d.user.name;
      localStorage.setItem("user", me);
      profileUser = params.get("user") || me;
      isOwnProfile = profileUser === me;
      return true;
    }
  }catch(e){}
  profileUser = params.get("user") || me;
  isOwnProfile = profileUser === me;
  return true;
}
function applyMode(){
  APP.classList.toggle("viewer-only", !isOwnProfile);
}
function renderUser(u){
  currentUserData = u;
  const name = u.name || profileUser || "User";
  const about = u.about || u.bio || "Hey there! I am using RickyY Chat";
  const phone = u.contact || u.phone || u.mobile || "";

  document.getElementById("usernameText").textContent = name;
  document.getElementById("aboutBig").textContent = about;
  document.getElementById("aboutValue").textContent = about;
  document.getElementById("aboutInput").value = about;
  document.getElementById("aboutCount").textContent = about.length;
  document.getElementById("bioInput").value = u.bio || "";
  document.getElementById("bioCount").textContent = (u.bio || "").length;

  document.getElementById("phoneValue").textContent = phone ? "📱 +91 " + phone : "📱 Not Added";
  document.getElementById("myDp").src = safeUrl(u.dp, "/default.png");
  document.title = name + " • RickyY Chat";
}
async function loadProfile(){
  try{
    const r = await fetch(api("/profile/" + encodeURIComponent(profileUser)), {headers:authHeaders()});
    const d = await r.json().catch(()=>null);
    if(d && d.ok && d.user){
      renderUser(d.user);
      return;
    }
    toast("Profile load failed");
  }catch(e){
    console.log(e);
    toast("Profile load failed");
  }
}
function openAboutEditor(){
  document.getElementById("aboutModal").classList.add("show");
  setTimeout(()=>document.getElementById("aboutInput").focus(),50);
}
function closeAboutEditor(){
  document.getElementById("aboutModal").classList.remove("show");
}
function setAboutInput(t){
  const inp = document.getElementById("aboutInput");
  inp.value = t;
  document.getElementById("aboutCount").textContent = t.length;
}
function quickAbout(t){
  setAboutInput(t);
  document.getElementById("aboutBig").textContent = t;
  document.getElementById("aboutValue").textContent = t;
  saveProfile(t);
}
function saveAboutFromModal(){
  const about = document.getElementById("aboutInput").value.trim();
  document.getElementById("aboutBig").textContent = about || "Hey there! I am using RickyY Chat";
  document.getElementById("aboutValue").textContent = about || "Hey there! I am using RickyY Chat";
  closeAboutEditor();
  saveProfile(about);
}
async function saveProfile(aboutOverride=null){
  if(!isOwnProfile) return;
  const bio = document.getElementById("bioInput").value.trim();
  const about = aboutOverride === null ? document.getElementById("aboutInput").value.trim() : aboutOverride;

  try{
    const r = await fetch(api("/update-profile"), {
      method:"POST",
      headers:headersJson(),
      body:JSON.stringify({username:me,bio,about})
    });
    const d = await r.json().catch(()=>null);
    if(d && d.ok){
      toast("Profile updated ✅");
    }else{
      toast((d && d.msg) || "Save failed");
    }
  }catch(e){
    toast("Server error");
  }
}
async function uploadDp(file){
  const fd = new FormData();
  fd.append("dp", file);
  fd.append("username", me);

  try{
    const r = await fetch(api("/upload-dp"), {
      method:"POST",
      headers:authHeaders(),
      body:fd
    });
    const d = await r.json().catch(()=>null);
    if(d && (d.status === "ok" || d.dp)){
      document.getElementById("myDp").src = safeUrl(d.dp, "/default.png");
      toast("DP updated ✅");
    }else{
      toast((d && d.msg) || "DP upload failed");
    }
  }catch(e){
    toast("DP upload failed");
  }
}
function openSettings(){document.getElementById("settingsModal").classList.add("show")}
function closeSettings(){document.getElementById("settingsModal").classList.remove("show")}
function openMedia(){document.getElementById("mediaModal").classList.add("show")}
function closeMedia(){document.getElementById("mediaModal").classList.remove("show")}

async function logout(){
  const name = me;
  localStorage.removeItem("user");
  localStorage.removeItem("role");
  localStorage.removeItem("authToken");
  try{
    await fetch(api("/api/logout"), {
      method:"POST",
      headers:headersJson(),
      body:JSON.stringify({name})
    });
  }catch(e){}
  location.href="/index.html";
}

document.getElementById("bioInput").addEventListener("input", e=>{
  document.getElementById("bioCount").textContent = e.target.value.length;
});
document.getElementById("aboutInput").addEventListener("input", e=>{
  document.getElementById("aboutCount").textContent = e.target.value.length;
});
document.getElementById("dpInput").addEventListener("change", e=>{
  const f = e.target.files && e.target.files[0];
  if(f) uploadDp(f);
});

if(socket && me){
  socket.on("connect", ()=>socket.emit("join", me));
}

(async function init(){
  const ok = await verify();
  if(!ok) return;
  applyMode();
  await loadProfile();
})();
</script>
</body>
</html>
