<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b141a;
  color:#e9edef;
  min-height:100vh;
}

.profile-page{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.topbar{
  height:64px;
  background:#202c33;
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:14px;
  box-shadow:0 1px 0 rgba(255,255,255,.04);
}

.back-btn{
  border:none;
  background:none;
  color:#e9edef;
  font-size:24px;
  cursor:pointer;
  padding:0;
}

.topbar-title{
  font-size:20px;
  font-weight:600;
}

.profile-content{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:34px 20px 24px;
}

.dp-wrap{
  position:relative;
  width:170px;
  height:170px;
  margin-bottom:28px;
}

.dp-wrap label{
  display:block;
  width:100%;
  height:100%;
  cursor:pointer;
}

.dp-wrap img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  display:block;
  background:#111b21;
  border:4px solid #202c33;
}

.dp-edit{
  position:absolute;
  right:10px;
  bottom:8px;
  width:46px;
  height:46px;
  border-radius:50%;
  background:#00a884;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  box-shadow:0 4px 12px rgba(0,0,0,.28);
  pointer-events:none;
}

.hidden-input{
  display:none;
}

.info-card{
  width:100%;
  max-width:420px;
  background:#202c33;
  border-radius:14px;
  overflow:hidden;
  margin-bottom:14px;
}

.info-row{
  padding:18px 18px 16px;
  border-bottom:1px solid rgba(255,255,255,.05);
}

.info-row:last-child{
  border-bottom:none;
}

.info-label{
  font-size:13px;
  color:#8696a0;
  margin-bottom:8px;
}

.info-value{
  font-size:19px;
  color:#e9edef;
  word-break:break-word;
}

.bio-input{
  width:100%;
  background:#111b21;
  border:1px solid rgba(255,255,255,.06);
  color:#e9edef;
  border-radius:12px;
  padding:14px 14px;
  font-size:15px;
  outline:none;
}

.bio-input::placeholder{
  color:#6f7f88;
}

.bio-count{
  margin-top:8px;
  font-size:12px;
  color:#8696a0;
  text-align:right;
}

.suggestion-title{
  font-size:13px;
  color:#8696a0;
  margin-bottom:10px;
}

.suggestion-wrap{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.suggestion-chip{
  border:none;
  background:#111b21;
  color:#e9edef;
  padding:10px 14px;
  border-radius:999px;
  cursor:pointer;
  font-size:14px;
}

.suggestion-chip:hover{
  background:#1f2c34;
}

.helper-text{
  width:100%;
  max-width:420px;
  color:#8696a0;
  font-size:14px;
  line-height:1.5;
  margin-top:4px;
}

.action-btn{
  margin-top:18px;
  width:100%;
  max-width:420px;
  height:48px;
  border:none;
  border-radius:999px;
  background:#00a884;
  color:#fff;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

.action-btn:hover{
  background:#019270;
}

.secondary-btn{
  margin-top:12px;
  width:100%;
  max-width:420px;
  height:46px;
  border:none;
  border-radius:999px;
  background:#202c33;
  color:#e9edef;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

.secondary-btn:hover{
  background:#24333c;
}

@media(max-width:600px){
  .profile-content{
    padding:26px 16px 20px;
  }

  .dp-wrap{
    width:150px;
    height:150px;
  }

  .info-value{
    font-size:18px;
  }
}
</style>
</head>
<body>

<div class="profile-page">
  <div class="topbar">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="topbar-title">Profile</div>
  </div>

  <div class="profile-content">
    <div class="dp-wrap">
      <label for="dpInput">
        <img id="myDp" src="/default.png" onerror="this.src='/default.png'">
      </label>
      <div class="dp-edit">📷</div>
    </div>

    <input type="file" id="dpInput" name="dp" class="hidden-input" accept="image/*">

    <div class="info-card">
      <div class="info-row">
        <div class="info-label">Name</div>
        <div class="info-value" id="usernameText"></div>
      </div>
    </div>

    <div class="info-card">
      <div class="info-row">
        <div class="info-label">Bio</div>
        <input
          id="bioInput"
          class="bio-input"
          type="text"
          maxlength="120"
          placeholder="Write your bio..."
        >
        <div class="bio-count"><span id="bioCount">0</span>/120</div>
      </div>

      <div class="info-row">
        <div class="suggestion-title">Suggestions</div>
        <div class="suggestion-wrap">
          <button class="suggestion-chip" onclick="setBioSuggestion('Busy')">Busy</button>
          <button class="suggestion-chip" onclick="setBioSuggestion('At work')">At work</button>
          <button class="suggestion-chip" onclick="setBioSuggestion('Sleeping')">Sleeping</button>
          <button class="suggestion-chip" onclick="setBioSuggestion('Available')">Available</button>
          <button class="suggestion-chip" onclick="setBioSuggestion('In a meeting')">In a meeting</button>
          <button class="suggestion-chip" onclick="setBioSuggestion('Battery low')">Battery low</button>
        </div>
      </div>
    </div>

    <button class="action-btn" onclick="saveProfile()">Save Profile</button>
    <button class="secondary-btn" onclick="document.getElementById('dpInput').click()">Change Profile Photo</button>
  </div>
</div>

<script>
const me = localStorage.getItem("user");

if(!me){
  window.location.href = "/index.html";
}

document.getElementById("usernameText").innerText = me;

const bioInput = document.getElementById("bioInput");
const bioCount = document.getElementById("bioCount");

bioInput.addEventListener("input", () => {
  bioCount.innerText = bioInput.value.length;
});

/* ---------- LOAD PROFILE ---------- */
async function loadProfile(){
  try{
    const res = await fetch("/profile/" + encodeURIComponent(me));
    const data = await res.json().catch(() => null);

    if(data && data.ok && data.user){
      if(data.user.dp){
        document.getElementById("myDp").src = data.user.dp;
      }

      bioInput.value = data.user.bio || "";
      bioCount.innerText = bioInput.value.length;
    }else{
      loadMyDp();
    }
  }catch(err){
    console.log("Profile load error", err);
    loadMyDp();
  }
}

/* ---------- LOAD ONLY DP FALLBACK ---------- */
async function loadMyDp(){
  try{
    const res = await fetch("/users-data");
    const users = await res.json();

    users.forEach(u => {
      if(u.name === me && u.dp){
        document.getElementById("myDp").src = u.dp;
      }
    });
  }catch(err){
    console.log("DP load error", err);
  }
}

loadProfile();

/* ---------- BIO SUGGESTIONS ---------- */
function setBioSuggestion(text){
  bioInput.value = text;
  bioCount.innerText = bioInput.value.length;
}

/* ---------- SAVE PROFILE ---------- */
async function saveProfile(){
  const bio = bioInput.value.trim();

  try{
    const res = await fetch("/update-profile", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        username: me,
        bio: bio,
        about: ""
      })
    });

    const data = await res.json().catch(() => null);

    if(data && data.ok){
      alert("Profile updated ✅");
    }else{
      alert((data && data.msg) || "Profile update failed");
    }
  }catch(err){
    console.log("Profile save error", err);
    alert("Server error");
  }
}

/* ---------- DP UPLOAD ---------- */
const dpInput = document.getElementById("dpInput");

dpInput.addEventListener("change", async ()=>{
  const file = dpInput.files[0];
  if(!file) return;

  const formData = new FormData();
  formData.append("dp", file);
  formData.append("username", me);

  try{
    const res = await fetch("/upload-dp", {
      method:"POST",
      body:formData
    });

    const data = await res.json();

    if(data.dp){
      document.getElementById("myDp").src = data.dp;
      alert("DP Updated Successfully 🔥");
    }else{
      alert(data.msg || "DP update failed");
    }
  }catch(err){
    console.log("Upload error", err);
    alert("Upload error");
  }
});

/* ---------- BACK ---------- */
function goBack(){
  window.location.href = "/chat.html";
}
</script>

</body>
</html>
